<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TRIO-LETTRES</title>

<style>
body{
  font-family:"Century Gothic",sans-serif;
  background:#fff;
  text-align:center;
  margin:0;
}

/* ===== Clavier NOIR / BLANC ===== */
body.clavier-noir .key{background:#000;color:#fff;border-color:#000}
body.clavier-blanc .key{background:#fff;color:#000;border-color:#555}

/* ===== Clavier COULEUR ===== */
.key.vert{background:#00a000;color:#fff;border-color:#007700}
.key.bleu{background:#003eff;color:#fff;border-color:#0028aa}
.key.rouge{background:#cc0000;color:#fff;border-color:#880000}
.key.noir{background:#000;color:#fff;border-color:#000}

h1{font-size:38px;margin:20px 0 10px}
.legend{font-style:italic}
.legend a{cursor:pointer;text-decoration:none;color:inherit}
.legend a:hover{text-decoration:underline}

.levels{display:flex;justify-content:center;gap:12px;margin:8px 0}
.level{width:36px;height:36px;border:2px solid #000;cursor:pointer}
.green{background:#00c000}
.blue{background:#0066ff}
.red{background:#e00000}
.black{background:#000}

/* ===== DICO ===== */
#dicoBar{display:flex;justify-content:center;gap:10px;font-weight:bold;margin-top:10px}
#dicoWords{
  max-width:900px;margin:6px auto 14px;
  white-space:pre-line;font-style:italic;line-height:1.6
}

/* ===== GRILLE ===== */
#grid-wrapper{display:inline-block;padding:18px}
#grid-wrapper.vert{background:#00a000}
#grid-wrapper.bleu{background:#003eff}
#grid-wrapper.rouge{background:#cc0000}
#grid-wrapper.noir{background:#000}

#grid{
  display:grid;
  grid-template-columns:repeat(3,90px);
  grid-template-rows:repeat(3,90px)
}
.cell{
  border:1px solid #333;
  font-family:"Century Schoolbook",serif;
  font-size:50px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none
}
.cell.vert{background:#e6f7e6;color:#006600}
.cell.bleu{background:#e6f0ff;color:#0033cc}
.cell.rouge{background:#ffe6e6;color:#990000}
.cell.noir{background:#fff;color:#000}
.cell.selected{outline:3px solid #888}
.cell.blanc{background:#fff!important}

/* ===== CLAVIERS ===== */
#voyelles{margin:14px 0 10px}
#consonnes{margin:10px 0 18px}
.keyboard-row{display:flex;justify-content:center;margin:6px}
.key{
  width:40px;height:40px;margin:4px;
  border:2px solid currentColor;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;border-radius:6px
}

/* ===== ACTIONS ===== */
.actions{margin:12px}
.actions button{
  padding:6px 16px;border:2px solid #555;
  background:#eee;cursor:pointer
}

/* ===== POPUP ===== */
#modalBg{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.4);
  display:none;z-index:1000
}
#modalBox{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#fff;border-radius:20px;
  padding:26px 30px;max-width:520px;
  pointer-events:none;text-align:center
}
#modalBox.vert{border:4px solid #00a000;color:#006600}
#modalBox.bleu{border:4px solid #003eff;color:#0033cc}
#modalBox.rouge{border:4px solid #cc0000;color:#990000}
#modalBox.noir{border:4px solid #000;color:#000}

/* ===== AIDE ===== */
.help-box{
  display:inline-block;
  margin:12px auto 8px;
  padding:8px 16px;
  border:2px dashed #666;
  background:#ffffff;
  font-style:italic;
  cursor:pointer;
}
.help-box:hover{background:#f5f5f5;}
</style>
</head>

<body>

<h1>TRIO-LETTRES</h1>

<div class="help-box" onclick="showRules()">Comment jouer ?</div>

<div class="legend">Choisir une couleur de grille</div>

<div class="levels">
  <div class="level green" onclick="setLvl('VERT')"></div>
  <div class="level blue" onclick="setLvl('BLEU')"></div>
  <div class="level red" onclick="setLvl('ROUGE')"></div>
  <div class="level black" onclick="setLvl('NOIR')"></div>
</div>

<div class="legend">
  Choisir la couleur du clavier :
  <a onclick="setKeyboard('noir')">NOIR</a> –
  <a onclick="setKeyboard('blanc')">BLANC</a>
</div>

<div id="dicoBar">
  DICTIONNAIRE
  <select id="dicoSelect" onchange="renderDico()"></select>
</div>
<div id="dicoWords"></div>

<div id="voyelles"></div>

<div id="grid-wrapper"><div id="grid"></div></div>

<div class="actions">
  <button onclick="valider()">VALIDER</button>
  <button onclick="nouvelle()">NOUVELLE PARTIE</button>
</div>

<div id="consonnes"></div>

<div id="modalBg"><div id="modalBox"></div></div>

<script>

/* ===== STOCKAGE PAR COULEUR ===== */
const STATES={VERT:null,BLEU:null,ROUGE:null,NOIR:null};

/* ===== DONNÉES ===== */
const RAW_WORDS=`ABC ACE ADO AGA AGE AHI AIE AIL AIR AIS ALE ALU AME AMI ANA ANE API ARA ARE ARC ARS ART AUX AVE AXE BAC BAH BAI BAL BAN BAR BAS BAT BAU BEE BEC BEL BEN BER BEY BIO BIS BIT BLE BOA BOF BOL BON BOT BOX BOY BRU BUN BUS BUT CAB CAO CAL CAP CAR CAS CEP CES CET CHI CIE CID CIL CIS CLE COB COL COM CON COQ COR COS COU CRI CRU CUL DAB DAG DAL DAM DAN DER DES DIA DIT DIX DOL DOM DON DOT DOS DRU DST DUO DUC DUR DYN DYS
EAU EBE ECU EON EGO ELU EMU EPI ERE ERS ERG EST ETA ETE ETC ETH EUH EUX EXO FAR FAT FAX FEE FER FEU FEZ FIC FIL FIN FOC FOI FOL FOR FOU FUR FUT
GAG GAI GAZ GEL GIN GLU GPS GOY GRE GUE GUI GUS HAI HAN HEM HEP HEU HIC HIE HIP HOC HOM HOP HOU HUE HUI ICI IDE ILE ION IRE ISO IVE JAN JAS JET JEU JOB JUS KAN KIN KHI KIF KIR KIT KOB KSI LAC LAD LAI LAS LES LEZ LIE LIN LIS LIT LOB LOF LOI LOK LOS LOT LUI LUT LUX LYS MAI MAL MAN MAS MAT MEC MER MES MET MIE MIL MIR MOI MOL MON MOT MOU MUE MUR MYE MYO NEF NEM NEO NET NEZ NIB NID NIT NOM NON NOS NUE NUL OBI OCA OCT ODE OFF OHE OHM OIE OIL OLE ONC OUI OPE ORD OSE OST ORT OUF OVE OVI OVO OXY OYE PAF PAL PAN PAR PAS PAT PER PET PEU PHI PIE PIC PIF PIS PIU PLI POP POT POU PRO PSI PUB PUR PUY QCM QUE QUI RAB RAD RAI RAM RAS RAT RAP RAZ REA REG REM REZ RHO RIA RIB RIF RIS RIT RIZ ROI ROB ROC ROM ROS ROT RUE RUT RUZ RYE
SAC SAI SAR SAS SEL SEN SEC SEP SES SET SIC SIL SIS SIX SKA SKI SOI SOL SON SOS SOT SOU SOY SPA SPE SPI SUB SUC SUD SUE SUR SUS SVP TAN TAF TAG TAO TAS TAU TEE TEK TEL TER TES TET TEX THE TIC TIF TIL TIN TIR TIP TOC TOI TOM TOT TOP TOX TRI TSF TUB TUE TUF ULM UNE UNI URE URO USE VAD VAL VAN VEL VER VIA VIE VIF VIL VIN VIS VIT VOL VOS VUE WAX WEB WON WOK XYL YAK YIN YEN YOD ZAC ZAD ZEE ZEN ZIG ZIP ZOE ZOO ZOU ZUP ZUT ZZZ`;
const WORDS=RAW_WORDS.split(/\s+/);
const ALLOWED=new Set(WORDS);
const DICO={};
WORDS.forEach(w=>(DICO[w[0]]??=[]).push(w));
Object.keys(DICO).forEach(k=>DICO[k]=[...new Set(DICO[k])].sort());

function chunk8(a){
  let r=[];
  for(let i=0;i<a.length;i+=8) r.push(a.slice(i,i+8).join(" · "));
  return r.join("\n");
}

function setupDico(){
  dicoSelect.innerHTML="";
  const empty=document.createElement("option");
  empty.value="";
  empty.textContent="";
  dicoSelect.appendChild(empty);

  Object.keys(DICO).sort().forEach(L=>{
    const o=document.createElement("option");
    o.value=L;
    o.textContent=L;
    dicoSelect.appendChild(o);
  });

  dicoSelect.value="";
  dicoWords.textContent="";
}

function renderDico(){
  const v=dicoSelect.value;
  dicoWords.textContent=v?chunk8(DICO[v]||[]):"";
}

/* ===== VARIABLES ===== */
let grid=Array(9).fill("");
let touched=Array(9).fill(false);
let selected=null;
let LVL="VERT";

/* ===== GRILLE ===== */
function initGrid(){
  gridDiv.innerHTML="";
  for(let i=0;i<9;i++){
    const c=document.createElement("div");
    c.className="cell";
    c.onclick=()=>cellClick(i);
    gridDiv.appendChild(c);
  }
}

function refresh(){
  document.querySelectorAll(".cell").forEach((c,i)=>{
    c.textContent=grid[i];
    c.className="cell "+LVL.toLowerCase();
    if(touched[i])c.classList.add("blanc");
    if(selected===i)c.classList.add("selected");
  });
}

function cellClick(i){
  if(grid[i]){grid[i]="";touched[i]=true;selected=null}
  else selected=i;
  refresh();
}

/* ===== CLAVIERS ===== */
function key(L){
  const k=document.createElement("div");
  k.className="key "+LVL.toLowerCase();
  k.textContent=L;
  k.onclick=()=>{if(selected!==null){grid[selected]=L;touched[selected]=true;selected=null;refresh()}};
  return k;
}

function initKeyboards(){
  voyelles.innerHTML="";
  const vrow=document.createElement("div");vrow.className="keyboard-row";
  "AEIOUY".split("").forEach(L=>vrow.appendChild(key(L)));
  voyelles.appendChild(vrow);

  consonnes.innerHTML="";
  ["BCDFG","HJKLM","NPQRS","TVWXZ"].forEach(r=>{
    const d=document.createElement("div");d.className="keyboard-row";
    r.split("").forEach(L=>d.appendChild(key(L)));
    consonnes.appendChild(d);
  });
}

/* ===== CLAVIER COULEUR ===== */
function setKeyboard(m){
  document.body.classList.remove("clavier-noir","clavier-blanc");
  document.body.classList.add(m==="noir"?"clavier-noir":"clavier-blanc");
}
function setKeyboardAuto(){
  document.body.classList.remove("clavier-noir","clavier-blanc");
}

/* ===== SAUVEGARDE ===== */
function saveState(){
  STATES[LVL]={grid:[...grid],touched:[...touched],selected};
}

/* ===== NIVEAU ===== */
function setLvl(l){

  if(l!==LVL) saveState();

  LVL=l;

  if(STATES[l]){
    grid=[...STATES[l].grid];
    touched=[...STATES[l].touched];
    selected=STATES[l].selected;
  } else {
    grid=Array(9).fill("");
    touched=Array(9).fill(false);
    selected=null;
    randomVowel();
  }

  gridWrapper.className=l.toLowerCase();
  setKeyboardAuto();
  initKeyboards();
  setupDico();
  refresh();
}

/* ===== NOUVELLE PARTIE ===== */
function nouvelle(){
  STATES[LVL]=null;
  setLvl(LVL);
}

/* ===== JEU ===== */
function randomVowel(){
  const v="AEIOU";
  const p=Math.floor(Math.random()*9);
  grid[p]=v[Math.floor(Math.random()*v.length)];
  touched[p]=true;
}

function valider(){

  // 1. grille complète ?
  if(grid.some(x=>!x)){
    showModal("<h2>✗ Grille non valide</h2>Grille incomplète.");
    return;
  }

  // 2. lignes
  const rows=[
    grid[0]+grid[1]+grid[2],
    grid[3]+grid[4]+grid[5],
    grid[6]+grid[7]+grid[8]
  ];

  // 3. colonnes
  const cols=[
    grid[0]+grid[3]+grid[6],
    grid[1]+grid[4]+grid[7],
    grid[2]+grid[5]+grid[8]
  ];

  // 4. vérification dictionnaire
  const ok=[...rows,...cols].every(w=>ALLOWED.has(w));

  // 5. résultat
  if(ok){
    showModal("<h2>🎉 BRAVO !</h2>Grille valide !");
  }else{
    showModal("<h2>✗ Grille non valide</h2>Vous pouvez continuer.");
  }
}

/* ===== POPUP ===== */
function showModal(html){
  modalBox.className=LVL.toLowerCase();
  modalBox.innerHTML=html;
  modalBg.style.display="block";
  modalBg.onclick=()=>modalBg.style.display="none";
}

function showRules(){
  showModal("Cliquez sur une case puis tapez une lettre.");
}

/* ===== INIT ===== */
const gridDiv=document.getElementById("grid");
const gridWrapper=document.getElementById("grid-wrapper");
const voyelles=document.getElementById("voyelles");
const consonnes=document.getElementById("consonnes");
const dicoSelect=document.getElementById("dicoSelect");
const dicoWords=document.getElementById("dicoWords");
const modalBg=document.getElementById("modalBg");
const modalBox=document.getElementById("modalBox");

initGrid();
setLvl("VERT");

</script>

</body>
</html>
